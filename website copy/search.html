<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Search — Federal Ministry of Defence</title>
  <meta name="description" content="Search the official website of the Federal Ministry of Defence." />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="assets/css/style.css?v=8" />
  <style>
    .result { padding: 22px 0; border-bottom: 1px solid var(--line); }
    .result h3 { font-size: 1.1rem; margin-bottom: 4px; }
    .result .url { font-size:.78rem; color: var(--green); margin-bottom: 6px; }
    .result p { color: var(--ink-3); font-size:.92rem; margin: 0; }
  </style>
</head>
<body>
  <div data-include="header"></div>

  <main id="main">
    <section class="page-hero">
      <div class="container">
        <div class="crumbs"><a href="index.html">Home</a><span>›</span>Search</div>
        <span class="eyebrow">Site Search</span>
        <h1>Search the Ministry.</h1>
        <p class="lead">Look across the entire defence.gov.ng website for the page, document or release you need.</p>
        <form method="get" action="search.html" style="margin-top:24px; max-width:640px;">
          <div style="display:flex; gap:8px;">
            <input type="search" name="q" id="searchQuery" placeholder="Search press releases, departments, services…" style="flex:1; padding:14px 18px; font-size:1.05rem; border:1px solid var(--line); border-radius: var(--radius);" autofocus>
            <button class="btn btn-green" type="submit">Search</button>
          </div>
        </form>
      </div>
    </section>

    <section>
      <div class="container container-narrow">
        <div id="searchResults"><p style="color:var(--ink-3); font-size:.95rem;">Type a query above to search.</p></div>
      </div>
    </section>

    <script>
      // Lightweight client-side search across known pages
      const INDEX = [
        { title: "Home", url: "index.html", body: "Federal Ministry of Defence Honourable Minister General Christopher Gwabin Musa" },
        { title: "About the Ministry", url: "about.html", body: "About FMOD mandate mission vision 1958 history" },
        { title: "Honourable Minister of Defence", url: "minister.html", body: "General Christopher Gwabin Musa rtd OFR profile" },
        { title: "Honourable Minister of State", url: "minister-of-state.html", body: "Dr Bello Mohammed Matawalle MON" },
        { title: "Management", url: "management.html", body: "Permanent Secretary Directors Jibrin Alhassan Henshaw Ogubike" },
        { title: "Our Structure", url: "structure.html", body: "Organisational chart departments parastatals" },
        { title: "Departments", url: "departments.html", body: "Army Affairs Navy Affairs Air Force Affairs Joint Services HRM Finance Procurement Legal Health" },
        { title: "Components — Army, Navy, Air Force, DHQ", url: "military.html", body: "Nigerian Army Navy Air Force Defence Headquarters DHQ" },
        { title: "Agencies — NDA, NDC, AFCSC, DICON, NAFRC, MPB, DIA", url: "agencies.html", body: "NDA NDC AFCSC DICON NAFRC MPB DIA tri-service" },
        { title: "Joint Operations", url: "operations.html", body: "HADIN KAI FANSAN YAMMA DELTA SAFE SAFE HAVEN MNJTF" },
        { title: "Press Releases", url: "press.html", body: "Press release speeches communiques news" },
        { title: "Gallery", url: "gallery.html", body: "photos gallery events" },
        { title: "Services", url: "services.html", body: "recruitment service charter downloads" },
        { title: "Veterans", url: "veterans.html", body: "veterans pensions NAFRC MPB welfare" },
        { title: "Procurement", url: "procurement.html", body: "tender bid procurement award BPP NOCOPO" },
        { title: "Freedom of Information", url: "foi.html", body: "FOI freedom of information request" },
        { title: "Contact", url: "contact.html", body: "contact address phone email ship house abuja" },
        { title: "SERVICOM", url: "servicom.html", body: "SERVICOM service compact complaint" },
        { title: "Accessibility", url: "accessibility.html", body: "accessibility WCAG screen reader" },
      ];
      const params = new URLSearchParams(location.search);
      const q = (params.get("q") || "").toLowerCase().trim();
      const out = document.getElementById("searchResults");
      const input = document.getElementById("searchQuery");
      if (q) {
        input.value = params.get("q");
        const matches = INDEX.filter(p => (p.title + " " + p.body).toLowerCase().includes(q));
        if (matches.length === 0) {
          out.innerHTML = `<p style="color:var(--ink-3);">No matches for <strong>${q}</strong>. Try a different keyword, or browse the <a href="sitemap.html">sitemap</a>.</p>`;
        } else {
          out.innerHTML = `<p style="color:var(--ink-3); margin-bottom:24px;">${matches.length} result${matches.length>1?'s':''} for <strong>${q}</strong>.</p>` +
            matches.map(m => `<div class="result"><div class="url">${m.url}</div><h3><a href="${m.url}">${m.title}</a></h3><p>${m.body.slice(0, 140)}…</p></div>`).join("");
        }
      }
    </script>
  </main>

  <div data-include="footer"></div>
  <div data-include="chatbot"></div>
  <div data-include="a11y"></div>

  <script src="assets/js/realdata.js"></script>
  <script src="assets/js/partials.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/google-translate.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/chatbot.js"></script>
</body>
</html>
